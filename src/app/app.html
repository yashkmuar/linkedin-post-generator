<div>

  <h1>LinkedIn Post Generator</h1>

  <br>

  <input 
    type="text" 
    placeholder="Topic" 
    [(ngModel)]="topic" >

    <br><br>

  <input 
    type="text"
    placeholder="Audience"
    [(ngModel)]="audience">

    <br><br>

    <select [(ngModel)]="tone">
      <option>Professional</option>
      <option>Gen-Z</option>
      <option>Founder</option>
      <option>Corporate</option>
      <option>Motivational</option>
    </select>

    <br><br>

    <select [(ngModel)]="length">
      <option>Short</option>
      <option>Medium</option>
      <option>Long</option>
    </select>

    <br><br>

    <button>
      Generate Post
    </button>

    <br><br>

    <textarea 
      rows="15"
      cols="80"
      [value]="generatedPost">
    </textarea>

    

</div>
